# Learning Hub dashboard — serve the static SPA at / and the generated reports at
# /reports/ via an alias. Reports are mounted at a SEPARATE path (/srv/reports), not
# nested under the read-only web root, so the container starts cleanly on a
# read-only web-root bind mount.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Generated magazines, courses and publications.json (read-only).
    location /reports/ {
        alias /srv/reports/;
        autoindex off;
        types {
            text/html      html;
            application/json json;
            application/pdf  pdf;
            image/png        png;
            image/jpeg       jpg jpeg;
        }
        default_type application/octet-stream;
    }
}
