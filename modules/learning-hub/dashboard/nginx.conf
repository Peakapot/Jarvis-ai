# Awareness Portal — serve the static SPA at / and the generated reports at
# /reports/ via an alias. Reports are mounted at a SEPARATE path (/srv/reports), not
# nested under the read-only web root, so the container starts cleanly on a
# read-only web-root bind mount.
#
# autoindex_format json lets the portal discover EVERY generated asset under
# /reports/ (any workflow's output) with no per-workflow changes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Generated assets (read-only) + machine-readable directory listings (JSON).
    location /reports/ {
        alias /srv/reports/;
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;
        types {
            text/html        html;
            application/json json;
            application/pdf  pdf;
            image/png        png;
            image/jpeg       jpg jpeg;
            text/calendar    ics;
            application/zip  zip;
        }
        default_type application/octet-stream;
    }
}
