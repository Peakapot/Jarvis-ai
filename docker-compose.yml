# =============================================================================
# docker-compose.yml — Jarvis service topology (Docker First)
# -----------------------------------------------------------------------------
# Everything that can run in a container does. Services are decoupled and
# individually replaceable (Modular architecture). Optional/future services are
# gated behind Compose profiles so the base stack stays lean while leaving a
# clear, no-redesign path to enable them later (Future expansion).
#
# Profiles:
#   (default)     n8n + ollama          — the core assistant runtime
#   vectordb      qdrant                 — future knowledge base / long-term memory
#   monitoring    prometheus + grafana   — future observability stack
#
# All tunables come from .env (Configuration over hard coding). Copy
# .env.example to .env (install.sh does this for you) before running.
# =============================================================================

name: jarvis

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

networks:
  jarvis-net:
    name: ${JARVIS_DOCKER_NETWORK:-jarvis-net}
    external: true

volumes:
  n8n_data:
    name: ${N8N_DATA_VOLUME:-jarvis_n8n_data}
  ollama_data:
    name: ${OLLAMA_DATA_VOLUME:-jarvis_ollama_data}
  qdrant_data:
    name: ${QDRANT_DATA_VOLUME:-jarvis_qdrant_data}
  prometheus_data:
    name: jarvis_prometheus_data
  grafana_data:
    name: jarvis_grafana_data

services:
  # ---------------------------------------------------------------------------
  # n8n — workflow automation engine and orchestration core.
  # ---------------------------------------------------------------------------
  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    container_name: ${N8N_CONTAINER_NAME:-jarvis-n8n}
    restart: unless-stopped
    networks: [jarvis-net]
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Core
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_BASE_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: ${TZ:-UTC}
      TZ: ${TZ:-UTC}
      # Security (Security by default)
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set in .env}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      # Allow workflow expressions to read $env (e.g. the Telegram allow-list,
      # brief schedules). Values come only from this stack's .env.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Allow the Read/Write File node to use the repo folders mounted below
      # (sources, reports, logs, templates). Without this n8n restricts file
      # access to /home/node/.n8n-files only.
      N8N_RESTRICT_FILE_ACCESS_TO: "/config;/reports;/logs;/templates;/prompts;/workflows"
      # Observability
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_LOG_OUTPUT: "console,file"
      N8N_LOG_FILE_LOCATION: /home/node/.n8n/logs/n8n.log
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${N8N_EXEC_MAX_AGE_HOURS:-336}
      # Allow Code nodes to use the built-in 'fs' module only (scoped), so the
      # Telegram handler can list archived intelligence briefs under /reports.
      NODE_FUNCTION_ALLOW_BUILTIN: ${N8N_ALLOW_BUILTIN:-fs}
      # Provider endpoints reachable from inside the network
      OLLAMA_BASE_URL: http://${OLLAMA_CONTAINER_NAME:-jarvis-ollama}:11434
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1:8b}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      # Claude (Anthropic) — optional AI provider for higher-quality analysis
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      # Gotenberg HTML->PDF service (used by intelligence briefs to emit PDF)
      GOTENBERG_URL: ${GOTENBERG_URL:-http://jarvis-gotenberg:3000}
      # Google Programmable Search (free) for real RFP/tender links
      GOOGLE_CSE_KEY: ${GOOGLE_CSE_KEY:-}
      GOOGLE_CSE_CX: ${GOOGLE_CSE_CX:-}
      # Telegram (primary interface) — workflows read these via $env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      # Chat that scheduled briefs are delivered to (falls back to first allowed chat)
      TELEGRAM_BRIEF_CHAT_ID: ${TELEGRAM_BRIEF_CHAT_ID:-}
      # Email delivery
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
      # Image provider (intelligence cover images)
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-openai}
      IMAGE_MODEL: ${IMAGE_MODEL:-gpt-image-1}
      IMAGE_SIZE: ${IMAGE_SIZE:-1536x1024}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGE_API_KEY: ${OPENAI_IMAGE_API_KEY:-}
      # Awareness toolkit — optional client white-label (blank = generic branding)
      CLIENT_NAME: ${CLIENT_NAME:-}
      # Default topic for awareness tools when none is supplied (form/Telegram blank)
      DEFAULT_AWARENESS_TOPIC: ${DEFAULT_AWARENESS_TOPIC:-phishing}
      # Intelligence product schedules / focus (workflows read these via $env)
      CYBER_BRIEF_ENABLED: ${CYBER_BRIEF_ENABLED:-true}
      CYBER_SECTION_IMAGES: ${CYBER_SECTION_IMAGES:-true}
      IMAGE_SECTION_SIZE: ${IMAGE_SECTION_SIZE:-1536x1024}
      CYBER_BRIEF_SCHEDULE_CRON: ${CYBER_BRIEF_SCHEDULE_CRON:-0 7 * * 1}
      CYBER_BRIEF_OUTPUT_FORMATS: ${CYBER_BRIEF_OUTPUT_FORMATS:-html,pdf,email,archive}
      CYBER_OPPS_ENABLED: ${CYBER_OPPS_ENABLED:-true}
      CYBER_OPPS_SCHEDULE_CRON: ${CYBER_OPPS_SCHEDULE_CRON:-15 6 * * *}
      CYBER_OPPS_PRIMARY_REGIONS: ${CYBER_OPPS_PRIMARY_REGIONS:-}
      CYBER_OPPS_SECONDARY_REGIONS: ${CYBER_OPPS_SECONDARY_REGIONS:-}
      CYBER_OPPS_OUTPUT_FORMATS: ${CYBER_OPPS_OUTPUT_FORMATS:-html,pdf,email,archive}
      ENERGY_BRIEF_ENABLED: ${ENERGY_BRIEF_ENABLED:-true}
      ENERGY_BRIEF_SCHEDULE_CRON: ${ENERGY_BRIEF_SCHEDULE_CRON:-30 6 * * *}
      ENERGY_BRIEF_PRIMARY_FOCUS: ${ENERGY_BRIEF_PRIMARY_FOCUS:-}
      ENERGY_BRIEF_SECONDARY_FOCUS: ${ENERGY_BRIEF_SECONDARY_FOCUS:-}
      ENERGY_BRIEF_OUTPUT_FORMATS: ${ENERGY_BRIEF_OUTPUT_FORMATS:-html,pdf,email,archive}
      DEFENCE_BRIEF_ENABLED: ${DEFENCE_BRIEF_ENABLED:-true}
      DEFENCE_BRIEF_SCHEDULE_CRON: ${DEFENCE_BRIEF_SCHEDULE_CRON:-30 5 * * 1}
      DEFENCE_SECTION_IMAGES: ${DEFENCE_SECTION_IMAGES:-true}
      DEFENCE_BRIEF_OUTPUT_FORMATS: ${DEFENCE_BRIEF_OUTPUT_FORMATS:-html,pdf,telegram,archive}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./logs:/home/node/.n8n/logs
      # Repo assets mounted at stable paths so workflows can reference them
      # deterministically (Separation of concerns; no host-path coupling).
      - ./workflows:/workflows:ro
      - ./prompts:/prompts:ro
      - ./config:/config:ro
      - ./templates:/templates:ro
      - ./reports:/reports
      - ./logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    depends_on:
      ollama:
        condition: service_started

  # ---------------------------------------------------------------------------
  # ollama — default, local-first AI provider (AI Provider Abstraction).
  # ---------------------------------------------------------------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ${OLLAMA_CONTAINER_NAME:-jarvis-ollama}
    restart: unless-stopped
    networks: [jarvis-net]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    # GPU passthrough is opt-in; uncomment and configure on capable hosts.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # gotenberg — stateless HTML/Markdown -> PDF engine (headless Chromium).
  # Used by the intelligence briefs to emit a branded PDF from the rendered HTML.
  # ---------------------------------------------------------------------------
  gotenberg:
    image: ${GOTENBERG_IMAGE:-gotenberg/gotenberg:8}
    container_name: ${GOTENBERG_CONTAINER_NAME:-jarvis-gotenberg}
    restart: unless-stopped
    networks: [jarvis-net]
    command: ["gotenberg", "--api-timeout=120s"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # dashboard — local "Learning Hub" web dashboard (static nginx). Serves the
  # SPA and the generated reports read-only at ONE origin, so the magazine, the
  # e-learning course and the dashboard share an origin (iframe + postMessage +
  # localStorage all work). Part of the Learning Hub module.
  # ---------------------------------------------------------------------------
  dashboard:
    image: ${DASHBOARD_IMAGE:-nginx:alpine}
    container_name: ${DASHBOARD_CONTAINER_NAME:-jarvis-dashboard}
    restart: unless-stopped
    networks: [jarvis-net]
    ports:
      - "${DASHBOARD_PORT:-8088}:80"
    volumes:
      - ./modules/learning-hub/dashboard:/usr/share/nginx/html:ro
      # Reports are served via an nginx alias (see nginx.conf) at /reports/ rather
      # than nested under the read-only web root — nesting fails to create the
      # mountpoint on a read-only parent.
      - ./reports:/srv/reports:ro
      - ./modules/learning-hub/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # qdrant — FUTURE vector database for knowledge base / long-term memory.
  # Enable with:  COMPOSE_PROFILES=vectordb docker compose up -d
  # ---------------------------------------------------------------------------
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: ${QDRANT_CONTAINER_NAME:-jarvis-qdrant}
    restart: unless-stopped
    profiles: ["vectordb"]
    networks: [jarvis-net]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # prometheus + grafana — FUTURE monitoring stack.
  # Enable with:  COMPOSE_PROFILES=monitoring docker compose up -d
  # ---------------------------------------------------------------------------
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: ${PROMETHEUS_CONTAINER_NAME:-jarvis-prometheus}
    restart: unless-stopped
    profiles: ["monitoring"]
    networks: [jarvis-net]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    logging: *default-logging

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: ${GRAFANA_CONTAINER_NAME:-jarvis-grafana}
    restart: unless-stopped
    profiles: ["monitoring"]
    networks: [jarvis-net]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]
    logging: *default-logging
