# =============================================================================
# prometheus.yml — scrape configuration for the FUTURE monitoring profile.
# Enabled via:  COMPOSE_PROFILES=monitoring docker compose up -d
# Kept in-repo (Infrastructure as Code) so observability is reproducible.
# =============================================================================
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    platform: jarvis

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # n8n exposes metrics when N8N_METRICS=true is set in its environment.
  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["jarvis-n8n:5678"]

  # Add exporters (node-exporter, cAdvisor, etc.) here as the stack grows.
